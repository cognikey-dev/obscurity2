kind = "web"
previewPath = "/"
title = "Obscurity"
version = "1.0.0"
id = "artifacts/obscurity"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24977

[services.development]
run = "pnpm --filter @workspace/obscurity run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/obscurity", "run", "build" ]
publicDir = "artifacts/obscurity/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24977"
BASE_PATH = "/"
